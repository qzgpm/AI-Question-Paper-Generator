<!DOCTYPE html>
<html>
<head>
    <title>KTU Question Paper Generator</title>
</head>
<body>
    <h1>FLAT – Topic & Bloom Selection</h1>

    <form method="post">
      {% csrf_token %}

      <label>Subject:</label>
      <input type="text" name="subject" value="Formal Languages and Automata" required>

      <h3>Modules & Topics with Bloom Level</h3>
      {% for module, topics in modules.items %}
        <strong>{{ module }}</strong><br>
        {% for t in topics %}
          <input type="checkbox" name="topics" value="{{ t }}">
          {{ t }}
          <select name="bloom_{{ t }}">
            <option value="Remember">Remember</option>
            <option value="Understand">Understand</option>
            <option value="Apply">Apply</option>
            <option value="Analyze">Analyze</option>
            <option value="Evaluate">Evaluate</option>
          </select>
          <br>
        {% endfor %}
        <hr>
      {% endfor %}

      <button type="submit">Generate Paper</button>
    </form>

</body>
</html>
